name: Legacy Windows Build

on:
  workflow_dispatch:

jobs:
  windows-x64:
    name: Windows x64 manual build
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Build and package
        shell: pwsh
        run: ./scripts/build-local-windows.ps1 -Configuration RelWithDebInfo -VisualStudio 2022 -Ci
      - name: Upload Windows ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: arvisual-obs-windows-x64-manual
          path: release/*.zip
