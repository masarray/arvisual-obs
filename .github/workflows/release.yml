name: Release Packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

env:
  CONFIGURATION: Release
  TEMPLATE_REF: 3e7d7ac3b5342cd7d9b88890b9c70b472d1520fc

jobs:
  preflight:
    name: Validate release tag and metadata
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository consistency
        run: python3 scripts/validate-repository.py

      - name: Run deterministic color-safety regression
        run: python3 scripts/validate-color-safety.py

  windows-x64:
    name: Windows x64 installer and manual ZIP
    needs: preflight
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build manual Windows ZIP
        shell: pwsh
        run: ./scripts/build-local-windows.ps1 -Configuration $env:CONFIGURATION -VisualStudio 2022 -TemplateRef $env:TEMPLATE_REF -Ci

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $spec = Get-Content buildspec.json -Raw | ConvertFrom-Json
          "version=$($spec.version)" >> $env:GITHUB_OUTPUT

      - name: Prepare installer source folder
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path release -Filter '*windows-x64.zip' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $zip) { throw 'Windows manual ZIP was not found in release/.' }

          $manual = Join-Path $PWD 'dist/windows-manual'
          if (Test-Path $manual) { Remove-Item $manual -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $manual | Out-Null
          Expand-Archive -Path $zip.FullName -DestinationPath $manual -Force

          $required = @(
            'obs-plugins/64bit/arvisual.dll',
            'data/obs-plugins/arvisual/effects/arvisual.effect',
            'data/obs-plugins/arvisual/locale/en-US.ini',
            'data/obs-plugins/arvisual/locale/id-ID.ini'
          )
          foreach ($item in $required) {
            $path = Join-Path $manual $item
            if (-not (Test-Path $path -PathType Leaf)) { throw "Installer source is missing: $path" }
          }

          "manual=$manual" >> $env:GITHUB_ENV

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build Windows installer EXE
        shell: pwsh
        run: |
          $iscc = Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6/ISCC.exe'
          if (-not (Test-Path $iscc)) { throw "ISCC.exe was not found at $iscc" }

          & $iscc "/DAppVersion=${{ steps.version.outputs.version }}" "/DSourceDir=$env:manual" "/DOutputDir=$PWD\release" "packaging\windows\arvisual.iss"
          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup compilation failed with exit code $LASTEXITCODE"
          }

          $installer = Get-ChildItem -Path release -Filter '*windows-x64.exe' | Select-Object -First 1
          if (-not $installer) { throw 'Windows installer EXE was not produced.' }
          Write-Host "Built $($installer.FullName)"

      - name: Upload Windows package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arvisual-windows-x64
          path: |
            release/*windows-x64.zip
            release/*windows-x64.exe
          if-no-files-found: error
          retention-days: 7

  macos-universal:
    name: macOS universal PKG and manual ZIP
    needs: preflight
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          version="$(python3 -c 'import json; print(json.load(open("buildspec.json"))["version"])')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Resolve pinned OBS plugin template
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .build/obs-plugintemplate
          git -C .build/obs-plugintemplate init
          git -C .build/obs-plugintemplate remote add origin https://github.com/obsproject/obs-plugintemplate.git
          git -C .build/obs-plugintemplate fetch --depth 1 origin "$TEMPLATE_REF"
          git -C .build/obs-plugintemplate checkout --detach FETCH_HEAD

          for item in src data CMakeLists.txt CMakePresets.json buildspec.json; do
            rm -rf ".build/obs-plugintemplate/$item"
            cp -R "$item" ".build/obs-plugintemplate/$item"
          done

      - name: Configure
        shell: bash
        working-directory: .build/obs-plugintemplate
        run: cmake --preset macos

      - name: Build
        shell: bash
        working-directory: .build/obs-plugintemplate
        run: cmake --build --preset macos --config "$CONFIGURATION" --parallel

      - name: Install to stage
        shell: bash
        working-directory: .build/obs-plugintemplate
        run: cmake --install build_macos --prefix "$GITHUB_WORKSPACE/dist/macos-stage" --config "$CONFIGURATION"

      - name: Package macOS PKG and manual ZIP
        shell: bash
        run: |
          set -euo pipefail
          VERSION='${{ steps.version.outputs.version }}'
          RELEASE_DIR="$GITHUB_WORKSPACE/release"
          MANUAL_DIR="$GITHUB_WORKSPACE/dist/macos-manual"
          PKG_ROOT="$GITHUB_WORKSPACE/dist/macos-pkg-root"

          mkdir -p "$RELEASE_DIR" "$MANUAL_DIR" "$PKG_ROOT/Library/Application Support/obs-studio/plugins"

          PLUGIN="$(find "$GITHUB_WORKSPACE/dist/macos-stage" -name 'arvisual.plugin' -type d | head -n 1)"
          if [[ -z "$PLUGIN" ]]; then
            PLUGIN="$(find "$GITHUB_WORKSPACE/.build/obs-plugintemplate/build_macos" -name 'arvisual.plugin' -type d | head -n 1)"
          fi
          if [[ -z "$PLUGIN" ]]; then
            echo 'arvisual.plugin was not found.' >&2
            exit 1
          fi

          cp -R "$PLUGIN" "$MANUAL_DIR/arvisual.plugin"
          cat > "$MANUAL_DIR/README-INSTALL-MACOS.txt" <<'TXT'
          ArVisual Smart Color Enhancer for OBS - macOS manual install

          1. Close OBS Studio.
          2. Copy arvisual.plugin to:
             ~/Library/Application Support/obs-studio/plugins/
          3. Open OBS Studio.
          4. Add filter: ArVisual - Smart Color Enhancer.
          TXT
          (cd "$MANUAL_DIR" && zip -qry "$RELEASE_DIR/arvisual-obs-v${VERSION}-macos-universal-manual.zip" .)

          cp -R "$PLUGIN" "$PKG_ROOT/Library/Application Support/obs-studio/plugins/arvisual.plugin"
          pkgbuild \
            --root "$PKG_ROOT" \
            --install-location / \
            --identifier com.masari.arvisual-obs \
            --version "$VERSION" \
            "$RELEASE_DIR/ArVisual-OBS-Installer-v${VERSION}-macos-universal.pkg"

      - name: Upload macOS package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arvisual-macos-universal
          path: |
            release/*macos-universal*.zip
            release/*macos-universal*.pkg
          if-no-files-found: error
          retention-days: 7

  linux-x86_64:
    name: Linux x86_64 DEB and manual TAR.GZ
    needs: preflight
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config zip tar dpkg-dev libobs-dev obs-studio

      - name: Read version
        id: version
        shell: bash
        run: |
          version="$(python3 -c 'import json; print(json.load(open("buildspec.json"))["version"])')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Resolve pinned OBS plugin template
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .build/obs-plugintemplate
          git -C .build/obs-plugintemplate init
          git -C .build/obs-plugintemplate remote add origin https://github.com/obsproject/obs-plugintemplate.git
          git -C .build/obs-plugintemplate fetch --depth 1 origin "$TEMPLATE_REF"
          git -C .build/obs-plugintemplate checkout --detach FETCH_HEAD

          for item in src data CMakeLists.txt CMakePresets.json buildspec.json; do
            rm -rf ".build/obs-plugintemplate/$item"
            cp -R "$item" ".build/obs-plugintemplate/$item"
          done

      - name: Configure
        shell: bash
        working-directory: .build/obs-plugintemplate
        run: cmake --preset ubuntu-x86_64

      - name: Build
        shell: bash
        working-directory: .build/obs-plugintemplate
        run: cmake --build --preset ubuntu-x86_64 --parallel

      - name: Install to stage
        shell: bash
        working-directory: .build/obs-plugintemplate
        run: cmake --install build_x86_64 --prefix "$GITHUB_WORKSPACE/dist/linux-stage"

      - name: Package Linux DEB and manual TAR.GZ
        shell: bash
        run: |
          set -euo pipefail
          VERSION='${{ steps.version.outputs.version }}'
          RELEASE_DIR="$GITHUB_WORKSPACE/release"
          MANUAL_DIR="$GITHUB_WORKSPACE/dist/linux-manual"
          DEB_ROOT="$GITHUB_WORKSPACE/dist/linux-deb"

          mkdir -p "$RELEASE_DIR" "$MANUAL_DIR" "$DEB_ROOT/DEBIAN"
          cp -a "$GITHUB_WORKSPACE/dist/linux-stage/." "$MANUAL_DIR/"

          cat > "$MANUAL_DIR/README-INSTALL-LINUX.txt" <<'TXT'
          ArVisual Smart Color Enhancer for OBS - Linux manual install

          Copy the staged folders into /usr/local, or copy the plugin library and data files into the matching OBS plugin paths used by your distro.

          Typical OBS paths:
          - /usr/lib/x86_64-linux-gnu/obs-plugins/
          - /usr/share/obs/obs-plugins/arvisual/
          TXT
          tar -C "$MANUAL_DIR" -czf "$RELEASE_DIR/arvisual-obs-v${VERSION}-linux-x86_64-manual.tar.gz" .

          mkdir -p "$DEB_ROOT/usr"
          cp -a "$GITHUB_WORKSPACE/dist/linux-stage/." "$DEB_ROOT/usr/"
          INSTALLED_SIZE="$(du -sk "$DEB_ROOT/usr" | cut -f1)"
          cat > "$DEB_ROOT/DEBIAN/control" <<EOF
          Package: arvisual-obs
          Version: ${VERSION}
          Section: video
          Priority: optional
          Architecture: amd64
          Depends: obs-studio
          Maintainer: Mas Ari <ari.sulistiono@gmail.com>
          Installed-Size: ${INSTALLED_SIZE}
          Description: ArVisual Smart Color Enhancer for OBS Studio
           Scene-adaptive smart color enhancement for OBS Studio.
          EOF
          dpkg-deb --build "$DEB_ROOT" "$RELEASE_DIR/arvisual-obs-v${VERSION}-linux-x86_64.deb"

      - name: Upload Linux package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arvisual-linux-x86_64
          path: |
            release/*linux-x86_64*.tar.gz
            release/*linux-x86_64*.deb
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish GitHub Release
    needs: [windows-x64, macos-universal, linux-x86_64]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          find . -maxdepth 1 -type f ! -name 'SHA256SUMS.txt' -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sed 's#  \./#  #' > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate build provenance attestations
        uses: actions/attest@v4
        with:
          subject-path: 'release-assets/*'

      - name: Publish release page
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-assets/*
          body: |
            ## ArVisual Smart Color Enhancer for OBS

            Scene-adaptive color enhancement with protected neutrals, skin-aware controls, controlled highlights, and a creator-friendly preset workflow.

            ### Recommended downloads

            **Windows**
            - `ArVisual-OBS-Setup-...windows-x64.exe` for normal users.
            - `arvisual-obs-...windows-x64.zip` for manual or portable OBS installation.

            **macOS**
            - `ArVisual-OBS-Installer-...macos-universal.pkg` for normal users.
            - `arvisual-obs-...macos-universal-manual.zip` for manual plugin copy.

            **Linux**
            - `arvisual-obs-...linux-x86_64.deb` for Debian/Ubuntu-style installs.
            - `arvisual-obs-...linux-x86_64-manual.tar.gz` for manual copy.

            ### Integrity

            Every package is listed in `SHA256SUMS.txt` and receives a GitHub build-provenance attestation. Windows and macOS packages are currently distributed without commercial code-signing certificates, so install only assets published by this repository.
