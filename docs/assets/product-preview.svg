<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 760" role="img" aria-labelledby="title desc">
  <title id="title">ArVisual Smart Color Enhancer control overview</title>
  <desc id="desc">A branded illustration of the ArVisual OBS filter controls and scene-adaptive color processing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07101f"/>
      <stop offset="0.52" stop-color="#10152b"/>
      <stop offset="1" stop-color="#1e1233"/>
    </linearGradient>
    <linearGradient id="accent" x1="340" y1="90" x2="1100" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#53dcff"/>
      <stop offset="0.45" stop-color="#7477ff"/>
      <stop offset="0.72" stop-color="#c15aff"/>
      <stop offset="1" stop-color="#ff647f"/>
    </linearGradient>
    <linearGradient id="scene" x1="224" y1="170" x2="750" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f6d660"/>
      <stop offset="0.28" stop-color="#ff7659"/>
      <stop offset="0.55" stop-color="#71d7bf"/>
      <stop offset="0.78" stop-color="#5f8cff"/>
      <stop offset="1" stop-color="#9b63ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#000" flood-opacity=".38"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
  </defs>

  <rect width="1440" height="760" rx="34" fill="url(#bg)"/>
  <circle cx="260" cy="90" r="170" fill="#2fe6ff" opacity=".12" filter="url(#glow)"/>
  <circle cx="1180" cy="650" r="220" fill="#d85eff" opacity=".12" filter="url(#glow)"/>

  <g filter="url(#shadow)">
    <rect x="118" y="86" width="1204" height="588" rx="26" fill="#0d1424" stroke="#ffffff" stroke-opacity=".12"/>
    <rect x="118" y="86" width="1204" height="62" rx="26" fill="#131b2d"/>
    <path d="M118 122h1204v26H118z" fill="#131b2d"/>
    <circle cx="154" cy="117" r="7" fill="#ff6b7d"/>
    <circle cx="178" cy="117" r="7" fill="#ffc95f"/>
    <circle cx="202" cy="117" r="7" fill="#5fe19b"/>
    <text x="239" y="124" fill="#f6f8ff" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="600">ArVisual — Smart Color Enhancer</text>
    <text x="1254" y="124" fill="#98a4bd" font-size="15" font-family="Segoe UI, Arial, sans-serif" text-anchor="end">OBS source filter</text>
  </g>

  <g>
    <rect x="154" y="180" width="676" height="454" rx="20" fill="#090f1c" stroke="#ffffff" stroke-opacity=".08"/>
    <rect x="176" y="202" width="632" height="410" rx="14" fill="url(#scene)"/>
    <rect x="176" y="202" width="632" height="410" rx="14" fill="#08111c" opacity=".12"/>
    <circle cx="320" cy="336" r="78" fill="#ffb244"/>
    <rect x="246" y="390" width="178" height="128" rx="22" fill="#f15348"/>
    <rect x="464" y="268" width="130" height="250" rx="26" fill="#52cdb6"/>
    <rect x="620" y="224" width="144" height="294" rx="28" fill="#5a78e8"/>
    <rect x="214" y="548" width="550" height="22" rx="11" fill="#ffffff" opacity=".72"/>
    <text x="202" y="237" fill="#fff" font-size="16" font-family="Segoe UI, Arial, sans-serif" font-weight="600">LIVE SOURCE</text>
    <rect x="655" y="215" width="122" height="34" rx="17" fill="#08111c" opacity=".7"/>
    <circle cx="678" cy="232" r="5" fill="#6ff0a8"/>
    <text x="691" y="238" fill="#effff5" font-size="14" font-family="Segoe UI, Arial, sans-serif">Smart Auto</text>
