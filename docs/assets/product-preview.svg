      <rect x="892" y="353" width="226" height="7" rx="3.5" fill="url(#accent)"/>
      <circle cx="1118" cy="356.5" r="8" fill="#e9fbff" stroke="#55dfff" stroke-width="3"/>

      <text x="892" y="398" fill="#dfe6f7" font-size="14">Color Pop</text>
      <text x="1256" y="398" fill="#aab6ca" font-size="14" text-anchor="end">Balanced</text>
      <rect x="892" y="411" width="364" height="7" rx="3.5" fill="#243048"/>
      <rect x="892" y="411" width="208" height="7" rx="3.5" fill="url(#accent)"/>
      <circle cx="1100" cy="414.5" r="8" fill="#f7f5ff" stroke="#8b77ff" stroke-width="3"/>

      <text x="892" y="456" fill="#dfe6f7" font-size="14">Clean White</text>
      <text x="1256" y="456" fill="#aab6ca" font-size="14" text-anchor="end">Smart</text>
      <rect x="892" y="469" width="364" height="7" rx="3.5" fill="#243048"/>
      <rect x="892" y="469" width="176" height="7" rx="3.5" fill="url(#accent)"/>
      <circle cx="1068" cy="472.5" r="8" fill="#f7f5ff" stroke="#b462ff" stroke-width="3"/>

      <text x="892" y="514" fill="#dfe6f7" font-size="14">Visual Clarity</text>
      <text x="1256" y="514" fill="#aab6ca" font-size="14" text-anchor="end">Protected</text>
      <rect x="892" y="527" width="364" height="7" rx="3.5" fill="#243048"/>
      <rect x="892" y="527" width="194" height="7" rx="3.5" fill="url(#accent)"/>
      <circle cx="1086" cy="530.5" r="8" fill="#fff7fb" stroke="#e45ed0" stroke-width="3"/>
    </g>

    <rect x="892" y="568" width="176" height="38" rx="9" fill="#202a40"/>
    <text x="980" y="593" fill="#d9e1f2" font-size="14" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Reset</text>
    <rect x="1080" y="568" width="176" height="38" rx="9" fill="url(#accent)"/>
    <text x="1168" y="593" fill="#fff" font-size="14" font-family="Segoe UI, Arial, sans-serif" font-weight="600" text-anchor="middle">Enhance</text>
  </g>

  <text x="720" y="715" fill="#a9b5cb" font-size="17" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Scene-adaptive color · protected neutrals · controlled highlights · creator-friendly presets</text>
</svg>
