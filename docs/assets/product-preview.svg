    <text x="892" y="219" fill="#f7f9ff" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="600">Professional color, simple controls</text>
    <text x="892" y="246" fill="#91a0bc" font-size="14" font-family="Segoe UI, Arial, sans-serif">Preset</text>
