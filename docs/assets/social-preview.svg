    <path d="M113.2 36.2A56 56 0 0 1 112 94H87.1A32 32 0 0 0 91.7 48.6l21.5-12.4Z" fill="url(#g2)"/>
    <path d="M112 94a56 56 0 0 1-50 26V96a32 32 0 0 0 25.1-2H112Z" fill="url(#g1)"/>
